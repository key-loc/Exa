<!DOCTYPE html>
<html>

<head>
    <title>Simple Greeting</title>
</head>

<body>

    <input type="text" id="nameInput" placeholder="Enter your name">
    <button onclick="greetUser()">Greet Me</button>

    <script>
        function greetUser() {
            var name = document.getElementById("nameInput").value;
            alert("hi " + name);
        }
    </script>

</body>

</html>
